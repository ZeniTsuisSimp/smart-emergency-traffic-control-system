name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==================== CI (Build & Test) ====================
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Project
        run: mvn clean install

      - name: Run Tests
        run: mvn test

  # ==================== CD (Build Docker & Deploy) ====================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # ==================== Docker Hub Push (Optional) ====================
      - name: Login to Docker Hub
        if: secrets.DOCKER_USERNAME != ''
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        if: secrets.DOCKER_USERNAME != ''
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smart-traffic-control:latest,${{ secrets.DOCKER_USERNAME }}/smart-traffic-control:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Skip Docker Push (No credentials)
        if: secrets.DOCKER_USERNAME == ''
        run: echo "⏭️  Skipping Docker Hub push (credentials not configured)"

      # ==================== Deploy to Railway (Recommended) ====================
      - name: Deploy to Railway
        run: |
          npm install -g @railway/cli
          railway up --service smart-traffic-control
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        continue-on-error: true

      # ==================== Deploy to Render ====================
      - name: Deploy to Render
        run: |
          curl -X POST https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_DEPLOY_KEY }}
        continue-on-error: true

      # ==================== Status Notification ====================
      - name: ✅ Deployment Success
        if: success()
        run: echo "Deployment completed successfully!"

      - name: ❌ Deployment Failed
        if: failure()
        run: echo "Deployment failed. Check logs for details."